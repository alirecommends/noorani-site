<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Gallery | Ali Noorani</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Google Fonts: Inter & Lora -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap"
        rel="stylesheet">

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Lora', 'serif'],
                    },
                    colors: {
                        pastel: {
                            primary: '#B3A8FF',   /* Deeper Periwinkle/Lavender */
                            primaryHover: '#988AFE',
                            dark: '#8673FF',      /* Deep Lavender for text/icons */
                            pink: '#FAD2E1',      /* Soft Blush */
                            mint: '#C5EBE1',      /* Soft Mint */
                            bg: '#FCFBFE',        /* Warm, slightly tinted white */
                            surface: '#F4F0FA',   /* Light section background */
                        }
                    }
                }
            }
        }
    </script>

    <style>
        :root {
            --card-height: 65vh;
            --card-aspect-ratio: 0.60;
            --card-width: calc(var(--card-height) * var(--card-aspect-ratio));
            --animation-duration: 1s;
            --animation-timing-function: cubic-bezier(0.47, 0, 0.23, 1.38);
            /* Softened the card shadows to fit the pastel theme (using lavender tints) */
            --spotlight-shadow: 0px 40px 100px -20px rgba(179, 168, 255, 0.25), 0px 20px 40px -10px rgba(179, 168, 255, 0.15);
            --stack-shadow: 0px 30px 60px -15px rgba(179, 168, 255, 0.15), 0px 10px 20px -5px rgba(179, 168, 255, 0.1);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #FCFBFE;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
        }

        h1,
        h2,
        h3,
        h4 {
            font-family: 'Lora', serif;
        }

        .scene-container {
            position: relative;
            width: 100%;
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .cards-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
        }

        .card {
            position: absolute;
            width: var(--card-width);
            height: var(--card-height);
            border-radius: 2rem;
            /* Increased border radius for softer look */
            border: 1px solid rgba(255, 255, 255, 0.8);
            top: 50%;
            transform-origin: center center;
            transition: transform var(--animation-duration) var(--animation-timing-function),
                opacity calc(var(--animation-duration) / 2) ease-in-out,
                box-shadow var(--animation-duration) ease-in-out;
            will-change: transform, opacity, box-shadow;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            padding: 0;
            box-sizing: border-box;
            overflow: hidden;
            cursor: grab;
        }

        .card:active {
            cursor: grabbing;
        }

        .end-of-deck-actions {
            position: absolute;
            top: 50%;
            z-index: 100;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            transition: opacity 0.5s ease 0.3s;
            opacity: 0;
            pointer-events: none;
        }

        .end-of-deck-actions.visible {
            opacity: 1;
            pointer-events: auto;
        }

        .cta-shadow {
            box-shadow: 0 10px 25px -5px rgba(208, 188, 235, 0.4);
        }
    </style>
</head>

<body class="bg-pastel-bg text-slate-800 antialiased selection:bg-pastel-primary selection:text-slate-900">

    <!-- Navigation -->
    <nav
        class="fixed w-full z-50 top-0 transition-all duration-300 bg-white/70 backdrop-blur-md border-b border-pastel-primary/30">
        <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center">
                <a href="index.html" class="text-xl font-bold font-sans tracking-tight text-slate-900">Ali Noorani<span
                        class="text-slate-400 font-normal">.work</span></a>
                <span
                    class="hidden sm:flex ml-4 px-2.5 py-1 bg-pastel-surface text-pastel-dark text-[11px] font-bold uppercase tracking-wider rounded border border-pastel-primary/50 items-center gap-1.5 cursor-default">
                    <i data-lucide="lock" class="w-3 h-3 text-pastel-dark"></i> Private
                </span>
            </div>

            <div class="hidden md:flex gap-8 items-center font-sans">
                <a href="index.html"
                    class="text-sm font-medium text-slate-500 hover:text-pastel-dark transition-colors">Home</a>
                <a href="about.html"
                    class="text-sm font-medium text-slate-500 hover:text-pastel-dark transition-colors">About</a>
                <span
                    class="text-sm font-medium text-pastel-dark font-bold cursor-default border-b-2 border-pastel-primary py-1">Portfolio</span>
                <a href="studies/geo.html"
                    class="text-sm font-medium text-slate-500 hover:text-pastel-dark transition-colors">GEO Strategy</a>
                <a href="contact.html"
                    class="px-5 py-2 bg-pastel-primary text-slate-900 text-sm font-bold rounded-full hover:bg-pastel-primaryHover transition-all cta-shadow">Get
                    in
                    touch</a>
            </div>

            <!-- Mobile Menu Btn -->
            <button class="md:hidden text-slate-600 hover:text-slate-900 focus:outline-none" id="mobile-menu-btn">
                <i data-lucide="menu" class="w-6 h-6"></i>
            </button>
        </div>

        <!-- Mobile Nav -->
        <div class="md:hidden hidden bg-white border-b border-pastel-primary/30 px-6 py-4 space-y-4 shadow-xl absolute w-full z-[2000]"
            id="mobile-menu">
            <a href="index.html" class="block text-sm font-medium text-slate-600">Home</a>
            <a href="about.html" class="block text-sm font-medium text-slate-600">About</a>
            <a href="portfolio.html" class="block text-sm font-medium text-pastel-dark font-bold">Portfolio</a>
            <a href="studies/geo.html" class="block text-sm font-medium text-slate-600">GEO Strategy</a>
            <a href="contact.html" class="block text-sm font-medium text-slate-600">Contact</a>
        </div>
    </nav>

    <!-- Filter Tabs Container -->
    <div class="pt-28 pb-4 text-center relative z-[1000]" id="filter-container"></div>

    <!-- Interactive Card Scene -->
    <main class="scene-container">
        <div class="cards-wrapper">
            <div class="end-of-deck-actions">
                <div id="filtered-actions" class="flex flex-col gap-4">
                    <button id="switch-category-btn"
                        class="bg-pastel-primary text-slate-900 px-8 py-4 rounded-full font-bold hover:bg-pastel-primaryHover transition-all cta-shadow text-lg"></button>
                    <button id="view-all-btn"
                        class="text-slate-500 font-bold hover:text-pastel-dark transition-colors tracking-wide">View All
                        Projects</button>
                </div>
                <div id="all-actions" class="hidden flex-col gap-4">
                    <button id="go-to-first-btn"
                        class="bg-pastel-primary text-slate-900 px-8 py-4 rounded-full font-bold hover:bg-pastel-primaryHover transition-all cta-shadow text-lg">Back
                        to Start</button>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer
        class="w-full px-10 py-6 flex justify-between items-center shrink-0 border-t border-pastel-primary/30 bg-[#F0ECF9] z-[1000]">
        <p class="text-sm font-sans font-medium text-slate-600">&copy; 2026 Ali Noorani.</p>
        <div class="flex items-center gap-6">
            <a href="https://linkedin.com/in/alinoorani1" target="_blank"
                class="text-slate-500 hover:text-pastel-dark transition-colors">
                <i data-lucide="linkedin" class="w-5 h-5"></i>
            </a>
            <a href="mailto:noorani.ali@gmail.com" class="text-slate-500 hover:text-pastel-dark transition-colors">
                <i data-lucide="mail" class="w-5 h-5"></i>
            </a>
        </div>
    </footer>

    <script>
        lucide.createIcons();

        // Mobile Menu
        const mobileBtn = document.getElementById('mobile-menu-btn');
        const mobileMenu = document.getElementById('mobile-menu');
        mobileBtn?.addEventListener('click', () => mobileMenu?.classList.toggle('hidden'));

        class CardScroller {
            constructor(containerSelector, filterContainerSelector, initialCardData) {
                this.container = document.querySelector(containerSelector);
                this.filterContainer = document.querySelector(filterContainerSelector);
                this.endOfDeckContainer = document.querySelector('.end-of-deck-actions');
                this.filteredActions = document.getElementById('filtered-actions');
                this.allActions = document.getElementById('all-actions');
                this.switchCategoryBtn = document.getElementById('switch-category-btn');
                this.viewAllBtn = document.getElementById('view-all-btn');
                this.goToFirstBtn = document.getElementById('go-to-first-btn');

                this.allCardData = initialCardData;
                this.cardData = [...this.allCardData];
                this.cards = [];
                this.currentIndex = 0;
                this.isAnimating = false;
                this.positions = [];
                this.exitLeftPosition = {};
                this.currentFilter = 'All';

                this.init();
            }

            init() {
                this.createFilters();
                this.renderCards();
                this.addEventListeners();
            }

            createFilters() {
                // Filtered to remove "Personal" category based on previous file context
                const filters = ['All', 'Professional'];
                filters.forEach(filter => {
                    const tab = document.createElement('div');
                    // Updated classes for Pastel Theme
                    tab.className = 'inline-block mx-2 px-6 py-2 text-sm font-bold tracking-wider uppercase text-slate-500 cursor-pointer rounded-full transition-all border border-transparent hover:bg-pastel-surface hover:text-pastel-dark';
                    tab.textContent = filter;
                    tab.dataset.filter = filter;
                    if (filter === this.currentFilter) {
                        tab.classList.add('text-pastel-dark', 'bg-pastel-surface', 'border-pastel-primary/50', 'shadow-sm');
                        tab.classList.remove('text-slate-500', 'border-transparent');
                    }
                    tab.addEventListener('click', () => this.applyFilter(filter));
                    this.filterContainer.appendChild(tab);
                });
            }

            applyFilter(filter) {
                if (filter === this.currentFilter || this.isAnimating) return;
                this.currentFilter = filter;
                this.endOfDeckContainer.classList.remove('visible');

                this.filterContainer.querySelectorAll('div').forEach(tab => {
                    const active = tab.dataset.filter === filter;
                    tab.classList.toggle('text-pastel-dark', active);
                    tab.classList.toggle('bg-pastel-surface', active);
                    tab.classList.toggle('border-pastel-primary/50', active);
                    tab.classList.toggle('shadow-sm', active);
                    tab.classList.toggle('text-slate-500', !active);
                    tab.classList.toggle('border-transparent', !active);
                });

                this.cardData = (filter === 'All') ? [...this.allCardData] : this.allCardData.filter(card => card.tag === filter);
                this.renderCards();
            }

            renderCards() {
                this.container.querySelectorAll('.card').forEach(c => c.remove());
                this.cards = [];
                this.currentIndex = 0;
                this.createCards();
                requestAnimationFrame(() => this.calculateAndSetPositions());
            }

            createCards() {
                const fragment = document.createDocumentFragment();
                this.cardData.forEach((data, index) => {
                    const cardEl = document.createElement('div');
                    cardEl.className = 'card bg-white shadow-xl';
                    cardEl.style.background = data.gradient;
                    cardEl.style.transform = `translateX(110vw) translateY(-50%)`;
                    // Updated card DOM elements for frosted pastel aesthetic
                    cardEl.innerHTML = `
                        <img src="${data.imageUrl}" class="w-full h-[45%] object-cover border-b border-white/40">
                        <div class="p-8 h-[55%] flex flex-col justify-between bg-white/40 backdrop-blur-md">
                            <div>
                                <h2 class="font-serif text-3xl font-bold text-slate-900 mb-3 leading-tight tracking-tight">${data.title}</h2>
                                <p class="text-slate-700 text-sm leading-relaxed font-sans">${data.content}</p>
                            </div>
                            <div class="flex justify-between items-center font-sans">
                                <span class="text-[10px] font-bold uppercase tracking-widest px-4 py-2 rounded-lg bg-white/70 text-slate-600 shadow-sm border border-white">${data.tag}</span>
                                ${data.link ? `<a href="${data.link}" class="text-sm font-bold text-pastel-dark hover:text-slate-900 transition-colors flex items-center gap-1 group">Explore <i data-lucide="arrow-right" class="w-4 h-4 transform group-hover:translate-x-1 transition-transform"></i></a>` : ''}
                            </div>
                        </div>`;
                    this.cards.push(cardEl);
                    fragment.appendChild(cardEl);
                });
                this.container.prepend(fragment);
                lucide.createIcons();
            }

            calculateAndSetPositions() {
                const vh = window.innerHeight / 100;
                const cardWidthPx = this.cards.length > 0 ? this.cards[0].offsetWidth : 0;
                const spotlightX = 19 * vh;
                this.positions = [{ x: spotlightX, rotate: 0, opacity: 1, scale: 1, shadow: 'var(--spotlight-shadow)', zIndex: this.cardData.length + 1 }];
                let curX = spotlightX + cardWidthPx + 4 * vh;
                for (let i = 1; i < this.cardData.length; i++) {
                    this.positions.push({ x: curX, rotate: 0, opacity: 1, scale: 1, shadow: 'var(--stack-shadow)', zIndex: this.cardData.length - i });
                    curX += 15 * vh;
                }
                this.exitLeftPosition = { x: -cardWidthPx * 1.5, rotate: -20, opacity: 0, scale: 1, shadow: 'none', zIndex: 0 };
                this.updateCardStyles(true);
            }

            goTo(idx) {
                if (this.isAnimating || idx < 0 || idx >= this.cards.length) return;
                this.isAnimating = true;
                this.currentIndex = idx;
                this.updateCardStyles();
                this.checkEndOfDeck();
                setTimeout(() => { this.isAnimating = false; }, 1000);
            }

            updateCardStyles(isInit = false) {
                this.cards.forEach((card, i) => {
                    const rel = i - this.currentIndex;
                    let pos = rel < 0 ? this.exitLeftPosition : (this.positions[rel] || { ...this.positions[this.positions.length - 1], x: window.innerWidth + 500, opacity: 0 });
                    card.style.transitionDelay = isInit ? `${rel * 100}ms` : '0ms';
                    card.style.transform = `translate(${pos.x}px, -50%) rotate(${pos.rotate}deg) scale(${pos.scale})`;
                    card.style.opacity = pos.opacity;
                    card.style.boxShadow = pos.shadow;
                    card.style.zIndex = pos.zIndex;
                });
            }

            checkEndOfDeck() {
                const isLast = this.currentIndex === this.cardData.length - 1;
                if (isLast && this.cardData.length > 0) {
                    this.filteredActions.style.display = 'none';
                    this.allActions.style.display = 'flex';

                    this.endOfDeckContainer.style.transform = `translate(${this.positions[1]?.x || this.positions[0].x}px, -50%)`;
                    this.endOfDeckContainer.classList.add('visible');
                } else this.endOfDeckContainer.classList.remove('visible');
            }

            addEventListeners() {
                let st; document.body.addEventListener('wheel', (e) => { e.preventDefault(); if (this.isAnimating) return; clearTimeout(st); st = setTimeout(() => this.goTo(this.currentIndex + (e.deltaY > 0 ? 1 : -1)), 50); }, { passive: false });
                let tx = 0; document.body.addEventListener('touchstart', (e) => tx = e.changedTouches[0].screenX, { passive: true });
                document.body.addEventListener('touchend', (e) => {
                    if (this.isAnimating) return;
                    const dist = e.changedTouches[0].screenX - tx;
                    if (Math.abs(dist) > 50) this.goTo(this.currentIndex + (dist < 0 ? 1 : -1));
                }, { passive: true });
                window.addEventListener('resize', () => this.calculateAndSetPositions());
                this.switchCategoryBtn.addEventListener('click', () => this.applyFilter('Professional'));
                this.viewAllBtn.addEventListener('click', () => this.applyFilter('All'));
                this.goToFirstBtn.addEventListener('click', () => this.goTo(0));
            }
        }

        // Project Data - Updated to matching Pastel Gradients
        const cardData = [
            { title: "GlobalDWS", content: "End-to-end redesign for a complex B2B digital platform increasing session duration by 80%.", tag: "Professional", gradient: "linear-gradient(135deg, #E2D5F8, #F4F0FA)", imageUrl: "src='../images/2d-map.png'", link: "studies/globaldws.html" },
            { title: "Canadian English Dictionary", content: "Designing the first comprehensive digital resource for Canadian English in over 20 years.", tag: "Professional", gradient: "linear-gradient(135deg, #C5EBE1, #FCFBFE)", imageUrl: "https://ik.imagekit.io/ekznzyzm7/ced_I9m6gTBjb.png?tr=f-auto&tr=w-1080", link: "studies/ced.html" },
            { title: "Rakuten Pay", content: "Information Architecture research and card sorting for a 44M user Fintech ecosystem.", tag: "Professional", gradient: "linear-gradient(135deg, #FAD2E1, #FFF0F5)", imageUrl: "https://ik.imagekit.io/ekznzyzm7/rakuten-feature_z_4L2oCTE.jpg?tr=f-auto&tr=w-1080", link: "studies/rakuten.html" },
            { title: "Rakuten Viber", content: "Integrating R-Cash P2P payments seamlessly into the Viber messaging platform.", tag: "Professional", gradient: "linear-gradient(135deg, #E2D5F8, #FCFBFE)", imageUrl: "https://ik.imagekit.io/ekznzyzm7/viber-cover.png", link: "studies/viber.html" },
            { title: "Andook", content: "Simplifying personal finance categories through user research for an American startup.", tag: "Professional", gradient: "linear-gradient(135deg, #C5EBE1, #EAF7F4)", imageUrl: "https://ik.imagekit.io/ekznzyzm7/andook-feature__ksl68KpK.png?tr=f-auto&tr=w-1080", link: "studies/andook.html" },
            { title: "Accessible Palette", content: "Methodological color system design for users with color-blindness and weak eyesight.", tag: "Professional", gradient: "linear-gradient(135deg, #FAD2E1, #FCFBFE)", imageUrl: "https://ik.imagekit.io/ekznzyzm7/palette-framed_FVT_3KjmT.png?tr=f-auto&tr=w-1080", link: "studies/palette.html" },
            { title: "Ideh Hub", content: "Timeless brand identity and stationery design for a boutique startup consultancy.", tag: "Professional", gradient: "linear-gradient(135deg, #FDE68A, #FEF3C7)", imageUrl: "https://ik.imagekit.io/ekznzyzm7/ideh-hub.jpg?tr=f-auto&tr=w-1080", link: "studies/idehhub.html" },
            { title: "Studyizy", content: "Startup dashboard helping international students manage the admission journey.", tag: "Professional", gradient: "linear-gradient(135deg, #C5EBE1, #EAF7F4)", imageUrl: "https://via.placeholder.com/400x300?text=Studyizy" }
        ];

        document.addEventListener('DOMContentLoaded', () => {
            new CardScroller('.cards-wrapper', '#filter-container', cardData);
        });
    </script>
</body>
