<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Gallery | Ali Noorani</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Google Fonts: Inter & Lora -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap"
        rel="stylesheet">

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Lora', 'serif'],
                    },
                    colors: {
                        brand: {
                            blue: '#0b5cff',
                            bg: '#f8fafc',
                        }
                    }
                }
            }
        }
    </script>

    <style>
        :root {
            --card-height: 65vh;
            --card-aspect-ratio: 0.60;
            --card-width: calc(var(--card-height) * var(--card-aspect-ratio));
            --animation-duration: 1s;
            --animation-timing-function: cubic-bezier(0.47, 0, 0.23, 1.38);
            --spotlight-shadow: 0px 594px 166px 0px rgba(0, 0, 0, 0.00), 0px 380px 152px 0px rgba(0, 0, 0, 0.02), 0px 214px 128px 0px rgba(0, 0, 0, 0.08), 0px 95px 95px 0px rgba(0, 0, 0, 0.13), 0px 24px 52px 0px rgba(0, 0, 0, 0.15);
            --stack-shadow: 183px 565px 166px 0px rgba(0, 0, 0, 0.00), 117px 361px 152px 0px rgba(0, 0, 0, 0.01), 66px 203px 128px 0px rgba(0, 0, 0, 0.03), 29px 90px 95px 0px rgba(0, 0, 0, 0.08), 7px 23px 52px 0px rgba(0, 0, 0, 0.10);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
        }

        .scene-container {
            position: relative;
            width: 100%;
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .cards-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
        }

        .card {
            position: absolute;
            width: var(--card-width);
            height: var(--card-height);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            top: 50%;
            transform-origin: center center;
            transition: transform var(--animation-duration) var(--animation-timing-function),
                opacity calc(var(--animation-duration) / 2) ease-in-out,
                box-shadow var(--animation-duration) ease-in-out;
            will-change: transform, opacity, box-shadow;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            padding: 0;
            box-sizing: border-box;
            overflow: hidden;
            cursor: grab;
        }

        .card:active {
            cursor: grabbing;
        }

        .end-of-deck-actions {
            position: absolute;
            top: 50%;
            z-index: 100;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            transition: opacity 0.5s ease 0.3s;
            opacity: 0;
            pointer-events: none;
        }

        .end-of-deck-actions.visible {
            opacity: 1;
            pointer-events: auto;
        }
    </style>
</head>

<body class="text-slate-800 antialiased selection:bg-brand-blue selection:text-white">

    <!-- Navigation -->
    <nav
        class="fixed w-full z-50 top-0 transition-all duration-300 bg-slate-50/90 backdrop-blur-md border-b border-slate-200">
        <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center">
                <a href="/index.html" class="text-xl font-bold font-sans tracking-tight text-slate-900">Ali Noorani<span
                        class="text-slate-400 font-normal">.work</span></a>
                <span
                    class="hidden sm:flex ml-4 px-2.5 py-1 bg-white text-slate-500 text-[11px] font-semibold uppercase tracking-wider rounded border border-slate-200 items-center gap-1.5 cursor-default">
                    <i data-lucide="lock" class="w-3 h-3"></i> Private
                </span>
            </div>

            <div class="hidden md:flex gap-8 items-center text-sm font-medium font-sans">
                <a href="/index.html" class="text-slate-500 hover:text-slate-900 transition-colors">Home</a>
                <a href="/about.html" class="text-slate-500 hover:text-slate-900 transition-colors">About</a>
                <span class="text-brand-blue border-b-2 border-brand-blue py-1">Portfolio</span>
                <a href="/contact.html"
                    class="px-5 py-2 bg-slate-900 text-white rounded-full hover:bg-slate-800 transition-colors">Get in
                    touch</a>
            </div>

            <!-- Mobile Menu Btn -->
            <button class="md:hidden text-slate-600" id="mobile-menu-btn">
                <i data-lucide="menu" class="w-6 h-6"></i>
            </button>
        </div>

        <div class="md:hidden hidden bg-white border-b border-slate-200 px-6 py-4 space-y-4 absolute w-full z-[2000]"
            id="mobile-menu">
            <a href="index.html" class="block text-slate-600">Home</a>
            <a href="about.html" class="block text-slate-600">About</a>
            <a href="portfolio.html" class="block text-brand-blue">Portfolio</a>
            <a href="contact.html" class="block text-slate-600">Contact</a>
        </div>
    </nav>

    <!-- Filter Tabs Container -->
    <div class="pt-28 pb-4 text-center relative z-[1000]" id="filter-container"></div>

    <!-- Interactive Card Scene -->
    <main class="scene-container">
        <div class="cards-wrapper">
            <div class="end-of-deck-actions">
                <div id="filtered-actions" class="flex flex-col gap-4">
                    <button id="switch-category-btn"
                        class="bg-slate-900 text-white px-6 py-3 rounded-full font-medium hover:bg-slate-800 transition-colors shadow-lg"></button>
                    <button id="view-all-btn"
                        class="text-slate-500 font-medium hover:text-slate-900 transition-colors">View All
                        Projects</button>
                </div>
                <div id="all-actions" class="hidden flex-col gap-4">
                    <button id="go-to-first-btn"
                        class="bg-slate-900 text-white px-6 py-3 rounded-full font-medium hover:bg-slate-800 transition-colors shadow-lg">Back
                        to Start</button>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer
        class="w-full px-10 py-6 flex justify-between items-center shrink-0 border-t border-slate-200 bg-white z-[1000]">
        <p class="text-sm font-sans text-slate-500">&copy; 2026 Ali Noorani.</p>
        <div class="flex items-center gap-4">
            <a href="https://linkedin.com/in/alinoorani1" target="_blank"
                class="text-slate-400 hover:text-brand-blue transition-colors">
                <i data-lucide="linkedin" class="w-5 h-5"></i>
            </a>
            <a href="mailto:noorani.ali@gmail.com" class="text-slate-400 hover:text-brand-blue transition-colors">
                <i data-lucide="mail" class="w-5 h-5"></i>
            </a>
        </div>
    </footer>

    <script>
        lucide.createIcons();

        // Mobile Menu
        const mobileBtn = document.getElementById('mobile-menu-btn');
        const mobileMenu = document.getElementById('mobile-menu');
        mobileBtn?.addEventListener('click', () => mobileMenu?.classList.toggle('hidden'));

        class CardScroller {
            constructor(containerSelector, filterContainerSelector, initialCardData) {
                this.container = document.querySelector(containerSelector);
                this.filterContainer = document.querySelector(filterContainerSelector);
                this.endOfDeckContainer = document.querySelector('.end-of-deck-actions');
                this.filteredActions = document.getElementById('filtered-actions');
                this.allActions = document.getElementById('all-actions');
                this.switchCategoryBtn = document.getElementById('switch-category-btn');
                this.viewAllBtn = document.getElementById('view-all-btn');
                this.goToFirstBtn = document.getElementById('go-to-first-btn');

                this.allCardData = initialCardData;
                this.cardData = [...this.allCardData];
                this.cards = [];
                this.currentIndex = 0;
                this.isAnimating = false;
                this.positions = [];
                this.exitLeftPosition = {};
                this.currentFilter = 'All';

                this.init();
            }

            init() {
                this.createFilters();
                this.renderCards();
                this.addEventListeners();
            }

            createFilters() {
                // Filtered to remove "Personal" category
                const filters = ['All', 'Professional'];
                filters.forEach(filter => {
                    const tab = document.createElement('div');
                    tab.className = 'inline-block mx-2 px-6 py-2 text-sm font-medium text-slate-500 cursor-pointer rounded-full transition-all border border-transparent hover:bg-slate-100';
                    tab.textContent = filter;
                    tab.dataset.filter = filter;
                    if (filter === this.currentFilter) tab.classList.add('text-slate-900', 'bg-white', 'border-slate-200', 'shadow-sm');
                    tab.addEventListener('click', () => this.applyFilter(filter));
                    this.filterContainer.appendChild(tab);
                });
            }

            applyFilter(filter) {
                if (filter === this.currentFilter || this.isAnimating) return;
                this.currentFilter = filter;
                this.endOfDeckContainer.classList.remove('visible');
                this.filterContainer.querySelectorAll('div').forEach(tab => {
                    const active = tab.dataset.filter === filter;
                    tab.classList.toggle('text-slate-900', active);
                    tab.classList.toggle('bg-white', active);
                    tab.classList.toggle('border-slate-200', active);
                    tab.classList.toggle('shadow-sm', active);
                });
                this.cardData = (filter === 'All') ? [...this.allCardData] : this.allCardData.filter(card => card.tag === filter);
                this.renderCards();
            }

            renderCards() {
                this.container.querySelectorAll('.card').forEach(c => c.remove());
                this.cards = [];
                this.currentIndex = 0;
                this.createCards();
                requestAnimationFrame(() => this.calculateAndSetPositions());
            }

            createCards() {
                const fragment = document.createDocumentFragment();
                this.cardData.forEach((data, index) => {
                    const cardEl = document.createElement('div');
                    cardEl.className = 'card shadow-xl';
                    cardEl.style.background = data.gradient;
                    cardEl.style.transform = `translateX(110vw) translateY(-50%)`;
                    cardEl.innerHTML = `
                        <img src="${data.imageUrl}" class="w-full h-[45%] object-cover border-b border-white/20">
                        <div class="p-8 h-[55%] flex flex-col justify-between">
                            <div>
                                <h2 class="font-serif text-3xl font-bold text-slate-900 mb-3 leading-tight">${data.title}</h2>
                                <p class="text-slate-700 text-sm leading-relaxed">${data.content}</p>
                            </div>
                            <div class="flex justify-between items-center">
                                <span class="text-[11px] font-bold uppercase tracking-wider px-3 py-1.5 rounded-full bg-white/50 text-slate-700">${data.tag}</span>
                                ${data.link ? `<a href="${data.link}" class="text-sm font-semibold text-brand-blue hover:underline flex items-center gap-1">Explore <i data-lucide="arrow-right" class="w-4 h-4"></i></a>` : ''}
                            </div>
                        </div>`;
                    this.cards.push(cardEl);
                    fragment.appendChild(cardEl);
                });
                this.container.prepend(fragment);
                lucide.createIcons();
            }

            calculateAndSetPositions() {
                const vh = window.innerHeight / 100;
                const cardWidthPx = this.cards.length > 0 ? this.cards[0].offsetWidth : 0;
                const spotlightX = 19 * vh;
                this.positions = [{ x: spotlightX, rotate: 0, opacity: 1, scale: 1, shadow: 'var(--spotlight-shadow)', zIndex: this.cardData.length + 1 }];
                let curX = spotlightX + cardWidthPx + 4 * vh;
                for (let i = 1; i < this.cardData.length; i++) {
                    this.positions.push({ x: curX, rotate: 0, opacity: 1, scale: 1, shadow: 'var(--stack-shadow)', zIndex: this.cardData.length - i });
                    curX += 15 * vh;
                }
                this.exitLeftPosition = { x: -cardWidthPx * 1.5, rotate: -20, opacity: 0, scale: 1, shadow: 'none', zIndex: 0 };
                this.updateCardStyles(true);
            }

            goTo(idx) {
                if (this.isAnimating || idx < 0 || idx >= this.cards.length) return;
                this.isAnimating = true;
                this.currentIndex = idx;
                this.updateCardStyles();
                this.checkEndOfDeck();
                setTimeout(() => { this.isAnimating = false; }, 1000);
            }

            updateCardStyles(isInit = false) {
                this.cards.forEach((card, i) => {
                    const rel = i - this.currentIndex;
                    let pos = rel < 0 ? this.exitLeftPosition : (this.positions[rel] || { ...this.positions[this.positions.length - 1], x: window.innerWidth + 500, opacity: 0 });
                    card.style.transitionDelay = isInit ? `${rel * 100}ms` : '0ms';
                    card.style.transform = `translate(${pos.x}px, -50%) rotate(${pos.rotate}deg) scale(${pos.scale})`;
                    card.style.opacity = pos.opacity;
                    card.style.boxShadow = pos.shadow;
                    card.style.zIndex = pos.zIndex;
                });
            }

            checkEndOfDeck() {
                const isLast = this.currentIndex === this.cardData.length - 1;
                if (isLast && this.cardData.length > 0) {
                    // Since personal is hidden, we hide the switch button as there is only one specific category left
                    this.filteredActions.style.display = 'none';
                    this.allActions.style.display = 'flex';

                    this.endOfDeckContainer.style.transform = `translate(${this.positions[1]?.x || this.positions[0].x}px, -50%)`;
                    this.endOfDeckContainer.classList.add('visible');
                } else this.endOfDeckContainer.classList.remove('visible');
            }

            addEventListeners() {
                let st; document.body.addEventListener('wheel', (e) => { e.preventDefault(); if (this.isAnimating) return; clearTimeout(st); st = setTimeout(() => this.goTo(this.currentIndex + (e.deltaY > 0 ? 1 : -1)), 50); }, { passive: false });
                let tx = 0; document.body.addEventListener('touchstart', (e) => tx = e.changedTouches[0].screenX, { passive: true });
                document.body.addEventListener('touchend', (e) => {
                    if (this.isAnimating) return;
                    const dist = e.changedTouches[0].screenX - tx;
                    if (Math.abs(dist) > 50) this.goTo(this.currentIndex + (dist < 0 ? 1 : -1));
                }, { passive: true });
                window.addEventListener('resize', () => this.calculateAndSetPositions());
                this.switchCategoryBtn.addEventListener('click', () => this.applyFilter('Professional'));
                this.viewAllBtn.addEventListener('click', () => this.applyFilter('All'));
                this.goToFirstBtn.addEventListener('click', () => this.goTo(0));
            }
        }

        // Project Data - Filtered to only Professional projects
        const cardData = [
            { title: "GlobalDWS", content: "End-to-end redesign for a complex B2B digital platform increasing session duration by 80%.", tag: "Professional", gradient: "linear-gradient(135deg, #f1f5f9, #e2e8f0)", imageUrl: "src="../ images / 2d- map.png", link: "studies / globaldws.html" },
            { title: "Canadian English Dictionary", content: "Designing the first comprehensive digital resource for Canadian English in over 20 years.", tag: "Professional", gradient: "linear-gradient(135deg, #eafbff, #dce7ff)", imageUrl: "https://ik.imagekit.io/ekznzyzm7/ced_I9m6gTBjb.png?tr=f-auto&tr=w-1080", link: "studies/ced.html" },
            { title: "Rakuten Pay", content: "Information Architecture research and card sorting for a 44M user Fintech ecosystem.", tag: "Professional", gradient: "linear-gradient(135deg, #ffebeb, #ffcaca)", imageUrl: "https://ik.imagekit.io/ekznzyzm7/rakuten-feature_z_4L2oCTE.jpg?tr=f-auto&tr=w-1080", link: "studies/rakuten.html" },
            { title: "Rakuten Viber", content: "Integrating R-Cash P2P payments seamlessly into the Viber messaging platform.", tag: "Professional", gradient: "linear-gradient(135deg, #f4f1ff, #e2d8ff)", imageUrl: "https://ik.imagekit.io/ekznzyzm7/viber-cover.png", link: "studies/viber.html" },
            { title: "Andook", content: "Simplifying personal finance categories through user research for an American startup.", tag: "Professional", gradient: "linear-gradient(135deg, #d7f9f8, #bdeee4)", imageUrl: "https://ik.imagekit.io/ekznzyzm7/andook-feature__ksl68KpK.png?tr=f-auto&tr=w-1080", link: "studies/andook.html" },
            { title: "Accessible Palette", content: "Methodological color system design for users with color-blindness and weak eyesight.", tag: "Professional", gradient: "linear-gradient(135deg, #fdf2f8, #fbcfe8)", imageUrl: "https://ik.imagekit.io/ekznzyzm7/palette-framed_FVT_3KjmT.png?tr=f-auto&tr=w-1080", link: "studies/palette.html" },
            { title: "Ideh Hub", content: "Timeless brand identity and stationery design for a boutique startup consultancy.", tag: "Professional", gradient: "linear-gradient(135deg, #fef3c7, #fde68a)", imageUrl: "https://ik.imagekit.io/ekznzyzm7/ideh-hub.jpg?tr=f-auto&tr=w-1080", link: "studies/idehhub.html" },
            { title: "Studyizy", content: "Startup dashboard helping international students manage the admission journey.", tag: "Professional", gradient: "linear-gradient(135deg, #ecfeff, #cffafe)", imageUrl: "https://via.placeholder.com/400x300?text=Studyizy" }
        ];

        document.addEventListener('DOMContentLoaded', () => {
            new CardScroller('.cards-wrapper', '#filter-container', cardData);
        });
    </script>
</body>

</html>
